<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - La Maison Bleue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">La Maison <span>Bleue</span></div>
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="reservation.html" class="active">Réservation</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </header>

    <section class="page-hero">
        <h1>Réserver une Table</h1>
        <p>Réservez votre table pour un moment d'exception</p>
    </section>

    <section class="section">
        <div class="reservation-container">
            <form id="reservationForm">
                <div class="form-group">
                    <label for="name">Nom complet *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date *</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Heure *</label>
                        <select id="time" name="time" required>
                            <option value="">Sélectionner</option>
                            <option value="12:00">12:00</option>
                            <option value="12:30">12:30</option>
                            <option value="13:00">13:00</option>
                            <option value="13:30">13:30</option>
                            <option value="19:00">19:00</option>
                            <option value="19:30">19:30</option>
                            <option value="20:00">20:00</option>
                            <option value="20:30">20:30</option>
                            <option value="21:00">21:00</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="guests">Nombre de personnes *</label>
                    <select id="guests" name="guests" required>
                        <option value="1">1 personne</option>
                        <option value="2">2 personnes</option>
                        <option value="3">3 personnes</option>
                        <option value="4">4 personnes</option>
                        <option value="5">5 personnes</option>
                        <option value="6">6 personnes</option>
                        <option value="7">7 personnes</option>
                        <option value="8">8+ personnes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="special_requests">Demandes spéciales</label>
                    <textarea id="special_requests" name="special_requests" rows="3" placeholder="Allergies, occasion spéciale, etc..."></textarea>
                </div>
                <button type="submit" class="btn reservation-btn">Confirmer la réservation</button>
                <div class="message-area" id="formMessage"></div>
            </form>
        </div>
    </section>

    <footer>
        <div class="social-links">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tripadvisor"></i></a>
        </div>
        <p>&copy; 2024 La Maison Bleue - Tous droits réservés</p>
    </footer>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-check-circle"></i>
            <h3>Réservation confirmée !</h3>
            <p>Merci, votre réservation a été enregistrée avec succès.</p>
            <button class="close-modal" onclick="closeModal()">Fermer</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
